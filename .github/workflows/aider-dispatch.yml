name: Aider DeepSeek Assistant

on:
  issue_comment:
    types: [created]

jobs:
  aider-agent:
    if: contains(github.event.comment.body, '@aider')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev-nijam
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider
        run: pip install aider-chat

      - name: Configure git
        run: |
          git config user.name "aider-bot"
          git config user.email "aider-bot@users.noreply.github.com"

      - name: Create branch
        run: git checkout -b agent/issue-${{ github.event.issue.number }}-fix-${{ github.run_number }}

      - name: Run Aider with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          aider --yes --model deepseek/deepseek-chat --no-check-update --message "Read GEMINI.md and AGENTS.md first and follow all rules there. ${{ github.event.comment.body }}" AGENTS.md

      - name: Commit any remaining changes
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "fix: automated change via Aider + DeepSeek for issue #${{ github.event.issue.number }}"

      - name: Push branch
        run: git push origin agent/issue-${{ github.event.issue.number }}-fix-${{ github.run_number }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base dev-nijam --head agent/issue-${{ github.event.issue.number }}-fix-${{ github.run_number }} --title "Fix issue #${{ github.event.issue.number }}" --body "Automated fix via Aider + DeepSeek"
