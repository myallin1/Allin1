name: Gemini CLI Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  gemini-agent:
    if: contains(github.event.comment.body, '@gemini-cli')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev-nijam
          fetch-depth: 0

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.18
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a coding agent working on the Allin1 Flutter repo.
            Read GEMINI.md and AGENTS.md first and follow all rules there.
            The user has requested a change in this issue comment:
            ${{ github.event.comment.body }}
            Make the requested change, create a new branch named
            agent/issue-<number>-<slug>, commit with a clear message,
            and open a pull request targeting the dev-nijam branch.
