name: erode_superapp
description: Erode All-in-One Super App - Multi-vendor Commerce MVP by NJ TECH
publish_to: 'none'
version: 1.0.1+5

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  bcrypt: ^1.1.3
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  encrypt: ^5.0.3
  file_picker: ^8.1.2
  firebase_analytics: any
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_crashlytics: any
  firebase_database: ^12.1.4
  firebase_messaging: ^16.1.2
  firebase_performance: any
  firebase_storage: ^13.1.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  flutter_map: ^8.2.2
  flutter_markdown: ^0.6.22
  flutter_ringtone_player: ^4.0.0+4
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  geocoding: ^4.0.0
  geolocator: ^13.0.2
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.1
  intl: ^0.19.0
  latlong2: ^0.9.1
  package_info_plus: ^9.0.0
  permission_handler: ^11.3.1
  pointycastle: ^3.9.1
  provider: ^6.1.2
  lottie: ^3.1.0
  scratcher: ^2.5.0
  shorebird_code_push: ^2.0.5
  speech_to_text: ^7.3.0
  url_launcher: ^6.3.2
  uuid: ^4.4.0
  web: ^1.1.0
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  audioplayers: ^6.6.0
  video_player:
  carousel_slider:

dev_dependencies:
  build_runner: ^2.4.8
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansTamil
      fonts:
        - asset: fonts/NotoSansTamil-Regular.ttf
          weight: 400
        - asset: fonts/NotoSansTamil-Regular.ttf
          weight: 500
        - asset: fonts/NotoSansTamil-Regular.ttf
          weight: 600
        - asset: fonts/NotoSansTamil-Regular.ttf
          weight: 700
  assets:
    - .env
    - assets/
    - assets/images/
    - shorebird.yaml

  # PWA / Web
  # Ensure web/index.html has: <meta name="theme-color" content="#0A0A12">
