  <!-- PWA Install Script -->
  <script>
    (function () {
      var deferredPrompt = null;
      var pwaPrompt = document.getElementById('pwa-install-prompt');
      var installBtn = document.getElementById('pwa-install-btn');
      var dismissBtn = document.getElementById('pwa-dismiss-btn');

      // Check if already dismissed
      if (localStorage.getItem('pwa-dismissed') === 'true') {
        pwaPrompt.style.display = 'none';
      }

      // Listen for install prompt
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        // Show prompt after 10 seconds
        setTimeout(function () {
          if (localStorage.getItem('pwa-dismissed') !== 'true') {
            pwaPrompt.style.display = 'block';
            pwaPrompt.classList.add('visible');
          }
        }, 10000);
      });

      // Handle install button click
      if (installBtn) {
        installBtn.addEventListener('click', function () {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function (choiceResult) {
              if (choiceResult.outcome === 'accepted') {
                pwaPrompt.style.display = 'none';
              }
              deferredPrompt = null;
            });
          }
        });
      }

      // Handle dismiss button click
      if (dismissBtn) {
        dismissBtn.addEventListener('click', function () {
          pwaPrompt.style.display = 'none';
          localStorage.setItem('pwa-dismissed', 'true');
        });
      }

      // Hide on app installed
      window.addEventListener('appinstalled', function () {
        pwaPrompt.style.display = 'none';
        localStorage.removeItem('pwa-dismissed');
      });
    })();
  </script>

  <!-- Splash Screen Script -->
  <script>
    (function () {
      var splash = document.getElementById('splash-screen');
      var status = document.querySelector('.splash-status');

      // Update status text
      var statuses = ['Initializing...', 'Loading resources...', 'Preparing app...', 'Almost ready...'];
      var index = 0;
      var statusInterval = setInterval(function () {
        index = (index + 1) % statuses.length;
        if (status) status.textContent = statuses[index];
      }, 800);

      // Hide splash when Flutter is ready
      window.addEventListener('flutter-first-frame', function () {
        clearInterval(statusInterval);
        if (splash) {
          splash.classList.add('hidden');
          splash.classList.remove('visible');
          setTimeout(function () {
            splash.style.display = 'none';
          }, 400);
        }
      }, { once: true });

      // Fallback: hide after 8 seconds
      setTimeout(function () {
        clearInterval(statusInterval);
        if (splash && splash.classList.contains('visible')) {
          splash.classList.add('hidden');
          splash.classList.remove('visible');
          setTimeout(function () {
            splash.style.display = 'none';
          }, 400);
        }
      }, 8000);
    })();
  </script>

  <!-- ── PWA Auto-Update: Force fresh code on new deploy ──────────── -->
  <script>
    // ── WebGL context loss recovery: force repaint on resume ──
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        window.dispatchEvent(new Event('resize'));
      }
    });

    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/flutter_service_worker.js')
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    if (confirm('🚀 New version available! Tap OK to update.')) {
                      newWorker.postMessage({ action: 'skipWaiting' });
                    }
                  }
                });
              }
            });
          });
      });
    }
  </script>
